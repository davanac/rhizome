name: Deploy Frontend to Scaleway

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build application
        working-directory: front
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_FRONTEND_URL: ${{ vars.VITE_FRONTEND_URL }}
          VITE_WEB3AUTH_CLIENT_ID: ${{ vars.VITE_WEB3AUTH_CLIENT_ID }}
          VITE_WEB3AUTH_NETWORK: ${{ vars.VITE_WEB3AUTH_NETWORK }}
        run: npm run build

      - name: Deploy to Scaleway Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.SCALEWAY_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCALEWAY_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.SCALEWAY_REGION }}
          FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
        run: |
          # Install AWS CLI
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update

          # Sync build files to S3 bucket root with long cache
          aws s3 sync ./front/dist s3://${FRONTEND_BUCKET}/ \
            --endpoint-url https://s3.${AWS_DEFAULT_REGION}.scw.cloud \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # Upload index.html with no-cache to ensure users get latest version
          aws s3 cp ./front/dist/index.html s3://${FRONTEND_BUCKET}/index.html \
            --endpoint-url https://s3.${AWS_DEFAULT_REGION}.scw.cloud \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          echo "✅ Frontend deployed successfully!"
          echo "🌐 Frontend URL: https://${FRONTEND_BUCKET}.s3-website.${AWS_DEFAULT_REGION}.scw.cloud/"

      - name: Deployment Summary
        run: |
          echo "### 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** \`${{ vars.FRONTEND_BUCKET }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** \`${{ vars.SCALEWAY_REGION }}\`" >> $GITHUB_STEP_SUMMARY
