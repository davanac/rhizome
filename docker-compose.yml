version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:17-alpine
    container_name: rhizome-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: rhizome
      POSTGRES_PASSWORD: rhizome
      POSTGRES_DB: rhizome
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhizome -d rhizome"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rhizome-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rhizome-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      # Server config
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:8000
      JWT_SECRET: docker-test-jwt-secret-change-in-production
      DOCKER: "true"  # Enable auto-migrations in Docker

      # Database config (using service name)
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: rhizome
      DB_PASS: rhizome
      DB_NAME: rhizome

      # Blockchain config
      BLOCKCHAIN_ENV: sepolia_optimism
      SEPOLIA_OPTIMISM_TESTNET_RPC_URL: https://sepolia.optimism.io
      SEPOLIA_OPTIMISM_TESTNET_CHAIN_ID: 11155420
      SEPOLIA_OPTIMISM_TESTNET_EXPLORER_URL: https://sepolia-optimistic.etherscan.io
      SEPOLIA_OPTIMISM_TESTNET_CHAIN_NAME: SepoliaOptimism

      # Web3Auth (optional for backend)
      VITE_WEB3AUTH_CLIENT_ID: ${VITE_WEB3AUTH_CLIENT_ID}
      VITE_WEB3AUTH_NETWORK: ${VITE_WEB3AUTH_NETWORK:-sapphire_devnet}

      # Wallet configuration for testnet blockchain operations
      CFR_FILE_PATH: /app/.rhizome/cfr.json
      MASTER_KEY_PASSWORD: docker-test-password
      MASTER_KEY_ID: rhizome.docker.testnet
      # Optional: Provide your own private key instead of auto-generating
      # PRIVATE_KEY: 0x1234567890abcdef...

      # External API URL for image URLs (served through frontend nginx)
      EXTERNAL_API_URL: "http://localhost:8000"
    volumes:
      - backend_files:/app/files
      # Optional: Mount your own cfr.json file to use existing wallet
      # - /path/to/your/cfr.json:/app/.rhizome/cfr.json:ro
    ports:
      - "3000:3000"
    # Healthcheck is defined in Dockerfile
    networks:
      - rhizome-network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        # Build-time environment variables
        VITE_API_URL: http://localhost:8000
        VITE_FRONTEND_URL: http://localhost:8000/
        VITE_WEB3AUTH_CLIENT_ID: ${VITE_WEB3AUTH_CLIENT_ID}
        VITE_WEB3AUTH_NETWORK: ${VITE_WEB3AUTH_NETWORK:-sapphire_devnet}
    container_name: rhizome-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rhizome-network

volumes:
  postgres_data:
    name: rhizome_postgres_data
  backend_files:
    name: rhizome_backend_files

networks:
  rhizome-network:
    name: rhizome-network
    driver: bridge
